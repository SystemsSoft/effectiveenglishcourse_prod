<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="English Effective Course">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Effective English">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Effective English Course</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // ── Intl.v8BreakIterator — neutralize deprecated getter ───────────────
    // Flutter's bootstrap (flutter_bootstrap.js) does:
    //   typeof Intl.v8BreakIterator  (to detect hasChromiumBreakIterators)
    // Accessing the native getter is enough for Chrome to fire its V8
    // UseCounter and show the DevTools deprecation warning.
    //
    // Fix: inspect the property descriptor WITHOUT invoking the getter
    // (Object.getOwnPropertyDescriptor does not call the getter).
    // If it is a native accessor (get function), redefine it as a plain
    // value so every subsequent access hits our stub — not the deprecated getter.
    //
    // We use a truthy stub (function) so flutter_bootstrap.js still sees
    // hasChromiumBreakIterators = true → Flutter picks the lighter skwasm
    // renderer. The Dart/WASM runtime always prefers Intl.Segmenter when
    // available (Chrome 99+), so the stub is never actually instantiated.
    (function () {
      try {
        var _d = Object.getOwnPropertyDescriptor(Intl, 'v8BreakIterator');
        if (_d && typeof _d.get === 'function') {
          Object.defineProperty(Intl, 'v8BreakIterator', {
            value: function IntlV8BreakIteratorStub() {},
            writable: true,
            configurable: true,
            enumerable: false,
          });
        }
      } catch (_) {}
    }());
    // ─────────────────────────────────────────────────────────────────────

    // ── PWA Install prompt ────────────────────────────────────────────────
    window.pwaInstallAvailable = false;
    window.deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.deferredInstallPrompt = e;
      window.pwaInstallAvailable = true;
      // Notifica o Flutter, se ele já estiver ouvindo
      if (typeof window.onPwaInstallAvailable === 'function') {
        window.onPwaInstallAvailable();
      }
    });

    window.triggerPwaInstall = function () {
      if (window.deferredInstallPrompt) {
        window.deferredInstallPrompt.prompt();
        window.deferredInstallPrompt.userChoice.then(function (choice) {
          window.deferredInstallPrompt = null;
          window.pwaInstallAvailable = false;
        });
      }
    };

    window.addEventListener('appinstalled', function () {
      window.pwaInstallAvailable = false;
      window.deferredInstallPrompt = null;
    });
    // ─────────────────────────────────────────────────────────────────────

    // ── Media Session API (controles na tela de bloqueio) ─────────────────
    window.updateMediaSession = function(title, artist) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: title || 'English Effective',
        artist: artist || 'English Effective Course',
        album: 'English Effective Course',
        artwork: [{ src: 'icons/Icon-192.png', sizes: '192x192', type: 'image/png' }]
      });
    };

    window.setMediaPlaybackState = function(state) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.playbackState = state; // 'playing' | 'paused' | 'none'
    };

    window.setMediaActionHandler = function(action, dartCallback) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.setActionHandler(action, dartCallback);
    };

    window.clearMediaSession = function() {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = null;
      navigator.mediaSession.playbackState = 'none';
      ['play','pause','stop'].forEach(function(a) {
        try { navigator.mediaSession.setActionHandler(a, null); } catch(_) {}
      });
    };
    // ─────────────────────────────────────────────────────────────────────
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
